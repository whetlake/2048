name: Test and build
on:
    push:
    pull_request:
jobs:
    test-and-build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                version: 10
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 24
                cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run tests
              run: pnpm test
            - name: Build
              run: pnpm build